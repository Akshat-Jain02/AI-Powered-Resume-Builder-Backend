name: Deploy to AWS EC2

on:
  push:
    branches: [ main ] # Change to your default branch if different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Docker Images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_REPO_NAME: resumeai
      run: |
        services=("eureka-server" "api-gateway" "auth-service" "ai-service" "resume-service" "section-service" "notification-service" "payment-service" "job-service" "template-service" "latex-compiler-service")
        for service in "${services[@]}"; do
          docker build -t $ECR_REGISTRY/$IMAGE_REPO_NAME-$service:latest ./$service
          docker push $ECR_REGISTRY/$IMAGE_REPO_NAME-$service:latest
        done

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/app # Update this path to where your app is on EC2
          # Login to ECR on EC2
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          # Pull latest images
          docker compose pull
          # Restart services
          docker compose up -d
