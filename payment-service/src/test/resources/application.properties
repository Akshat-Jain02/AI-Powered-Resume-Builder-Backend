# Test configuration - uses H2 in-memory DB instead of MySQL
spring.application.name=payment-service
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Eureka for tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable Kafka auto-config for tests
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Dummy Razorpay config
razorpay.key.id=dummy_key
razorpay.key.secret=dummy_secret
razorpay.currency=INR
razorpay.company.name=ResumeAI
razorpay.company.logo=

# Payment plans
payment.plans.basic.price=299
payment.plans.basic.credits=10
payment.plans.basic.name=Basic Pack
payment.plans.pro.price=599
payment.plans.pro.credits=25
payment.plans.pro.name=Pro Pack
payment.plans.premium.price=999
payment.plans.premium.credits=50
payment.plans.premium.name=Premium Pack

