
server.port=8086
spring.application.name=job-service

#adzuna keys
adzuna.app.id=${ADZUNA_ID:your_adzuna_app_id}
adzuna.app.key=${ADZUNA_KEY:your_adzuna_app_key}
adzuna.country=gb
adzuna.results.per.page=20


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


#  Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}



logging.file.path=../logs/job-service

