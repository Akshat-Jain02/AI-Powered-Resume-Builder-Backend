# Route 16: latex-compiler-service
spring.cloud.gateway.routes[16].id=latex-compiler-service
spring.cloud.gateway.routes[16].uri=lb://latex-compiler-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/compiler/**

# Route 17: openapi-compiler
spring.cloud.gateway.routes[17].id=openapi-compiler
spring.cloud.gateway.routes[17].uri=lb://latex-compiler-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/latex-compiler-service/v3/api-docs**
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/latex-compiler-service/(?<segment>.*), /${segment}

# Global CORS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowedOrigins=http://localhost:5173,http://localhost:3000,http://localhost:5174
spring.cloud.gateway.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations[/**].allowCredentials=true
