spring.application.name=api-gateway
server.port=8080

# Routes
# Route 0: auth-service (static URI  OAuth2 needs session affinity, not load-balanced)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8089
spring.cloud.gateway.routes[0].predicates[0]=Path=/login/**,/api/auth/**,/oauth2/**

# Route 1-6: downstream services (load-balanced via Eureka)
spring.cloud.gateway.routes[1].id=ai-service
spring.cloud.gateway.routes[1].uri=lb://ai-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/ai/**

spring.cloud.gateway.routes[2].id=job-service
spring.cloud.gateway.routes[2].uri=lb://job-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/job/**

spring.cloud.gateway.routes[3].id=resume-service
spring.cloud.gateway.routes[3].uri=lb://resume-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/resume/**

spring.cloud.gateway.routes[4].id=template-service
spring.cloud.gateway.routes[4].uri=lb://template-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/templates/**

spring.cloud.gateway.routes[5].id=section-service
spring.cloud.gateway.routes[5].uri=lb://section-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/parser/**

spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=lb://payment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payment/**

# Route 7: admin endpoints for auth-service user management
spring.cloud.gateway.routes[7].id=auth-service-admin
spring.cloud.gateway.routes[7].uri=http://localhost:8089
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/admin/**

#  Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
jwt.secret=${JWT_KEY}
spring.security.enabled=false

#  Logging
logging.file.path=../logs/api-gateway

# Swagger UI Aggregation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=AI Service
springdoc.swagger-ui.urls[1].url=/ai-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Job Service
springdoc.swagger-ui.urls[2].url=/job-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Resume Service
springdoc.swagger-ui.urls[4].url=/resume-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Section Service
springdoc.swagger-ui.urls[5].url=/section-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=Template Service
springdoc.swagger-ui.urls[6].url=/template-service/v3/api-docs
springdoc.swagger-ui.urls[7].name=Notification Service
springdoc.swagger-ui.urls[7].url=/notification-service/v3/api-docs
springdoc.swagger-ui.urls[8].name=Latex Compiler
springdoc.swagger-ui.urls[8].url=/latex-compiler-service/v3/api-docs

# --- Swagger OpenAPI Routes ---
spring.cloud.gateway.routes[8].id=openapi-auth
spring.cloud.gateway.routes[8].uri=http://localhost:8089
spring.cloud.gateway.routes[8].predicates[0]=Path=/auth-service/v3/api-docs**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[9].id=openapi-ai
spring.cloud.gateway.routes[9].uri=lb://ai-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/ai-service/v3/api-docs**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/ai-service/(?<segment>.*), /${segment}

