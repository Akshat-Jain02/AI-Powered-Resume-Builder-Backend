spring.application.name=template-service

#  MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/template_service
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  Server
server.port=8087

#  Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
#  Logging

#  Logging
# logback-spring.xml handles appenders, rolling, patterns, and per-package levels.
# Only override log directory and active profile here.
logging.file.path=../logs/template-service

