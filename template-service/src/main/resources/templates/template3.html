<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Resume</title></head>
<body style="margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif;background:#fff;">
<div style="width:800px;margin:0 auto;display:flex;min-height:1080px;">

  <!-- LEFT DARK SIDEBAR with photo -->
  <div style="width:260px;background:#1e2d3d;color:#fff;padding:36px 28px;flex-shrink:0;">

    <!-- Photo -->
    <div th:if="${photoBase64 != null and photoBase64 != ''}" style="text-align:center;margin-bottom:20px;">
      <img th:src="'data:image/jpeg;base64,' + ${photoBase64}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:6px solid #2ecc71;"/>
    </div>

    <h1 style="margin:0 0 4px;font-size:20px;font-weight:700;line-height:1.2;" th:text="${fullName}">Your Name</h1>
    <p style="margin:0 0 24px;font-size:12px;color:#2ecc71;font-weight:600;text-transform:uppercase;letter-spacing:1px;" th:text="${targetJobTitle}">Title</p>

    <!-- Contact -->
    <div style="margin-bottom:24px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2ecc71;border-bottom:1px solid rgba(46,204,113,0.3);padding-bottom:5px;margin-bottom:10px;">Contact</div>
      <div th:if="${email != ''}" style="font-size:11.5px;color:#ccc;margin-bottom:6px;word-break:break-all;" th:text="${email}"></div>
      <div th:if="${phone != ''}" style="font-size:11.5px;color:#ccc;margin-bottom:6px;" th:text="${phone}"></div>
      <div th:if="${address != ''}" style="font-size:11.5px;color:#ccc;margin-bottom:6px;" th:text="${address}"></div>
      <div th:if="${linkedinUrl != ''}" style="font-size:11px;color:#7ec8e3;margin-bottom:4px;word-break:break-all;" th:text="${linkedinUrl}"></div>
      <div th:if="${githubUrl != ''}" style="font-size:11px;color:#7ec8e3;word-break:break-all;" th:text="${githubUrl}"></div>
    </div>

    <!-- Skills -->
    <div th:if="${skills != null and !#lists.isEmpty(skills)}" style="margin-bottom:24px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2ecc71;border-bottom:1px solid rgba(46,204,113,0.3);padding-bottom:5px;margin-bottom:10px;">Skills</div>
      <div th:each="s : ${skills}" style="margin-bottom:8px;">
        <div style="font-size:11.5px;color:#e8e8e8;margin-bottom:3px;" th:text="${s}"></div>
        <div style="height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
          <div style="height:100%;background:#2ecc71;width:80%;border-radius:2px;"></div>
        </div>
      </div>
    </div>

    <!-- Education -->
    <div th:if="${education != null and !#lists.isEmpty(education)}" style="margin-bottom:24px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2ecc71;border-bottom:1px solid rgba(46,204,113,0.3);padding-bottom:5px;margin-bottom:10px;">Education</div>
      <div th:each="edu : ${education}" style="margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:#fff;" th:text="${edu.degree}"></div>
        <div th:if="${edu.field != null and edu.field != ''}" style="font-size:11px;color:#aaa;" th:text="${edu.field}"></div>
        <div style="font-size:11.5px;color:#2ecc71;" th:text="${edu.institution}"></div>
        <div style="font-size:10.5px;color:#888;" th:text="${edu.startDate} + ' – ' + (${edu.endDate} ?: '')"></div>
      </div>
    </div>

    <!-- Languages -->
    <div th:if="${resumeLanguages != null and !#lists.isEmpty(resumeLanguages)}">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2ecc71;border-bottom:1px solid rgba(46,204,113,0.3);padding-bottom:5px;margin-bottom:10px;">Languages</div>
      <div th:each="l : ${resumeLanguages}" style="font-size:12px;color:#ccc;margin-bottom:4px;" th:text="${l}"></div>
    </div>
  </div>

  <!-- RIGHT MAIN -->
  <div style="flex:1;padding:36px 36px;">

    <div th:if="${summary != ''}" style="margin-bottom:28px;">
      <h2 style="margin:0 0 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1e2d3d;">About Me</h2>
      <div style="width:40px;height:3px;background:#2ecc71;border-radius:2px;margin-bottom:12px;"></div>
      <p style="margin:0;font-size:13px;line-height:1.8;color:#444;" th:text="${summary}"></p>
    </div>

    <div th:if="${experience != null and !#lists.isEmpty(experience)}" style="margin-bottom:28px;">
      <h2 style="margin:0 0 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1e2d3d;">Experience</h2>
      <div style="width:40px;height:3px;background:#2ecc71;border-radius:2px;margin-bottom:14px;"></div>
      <div th:each="exp : ${experience}" style="margin-bottom:20px;position:relative;padding-left:16px;border-left:2px solid #e0e0e0;">
        <div style="position:absolute;left:-5px;top:4px;width:8px;height:8px;background:#2ecc71;border-radius:50%;"></div>
        <div style="font-size:14px;font-weight:700;color:#1e2d3d;" th:text="${exp.position} ?: ${exp.role} ?: ''"></div>
        <div style="font-size:12.5px;color:#2ecc71;font-weight:600;" th:text="${exp.company}"></div>
        <div style="font-size:11px;color:#888;margin-top:2px;" th:text="${exp.startDate} + ' – ' + (${exp.current} ? 'Present' : (${exp.endDate} ?: ''))"></div>
        <div th:if="${exp.description != null and exp.description != ''}" style="margin-top:7px;font-size:12.5px;line-height:1.75;color:#555;" th:text="${exp.description}"></div>
        <ul th:if="${exp.bullets != null and !#lists.isEmpty(exp.bullets)}" style="margin:7px 0 0;padding-left:18px;">
          <li th:each="b : ${exp.bullets}" style="font-size:12.5px;line-height:1.7;color:#555;margin-bottom:3px;" th:text="${b}"></li>
        </ul>
      </div>
    </div>

    <div th:if="${projects != null and !#lists.isEmpty(projects)}" style="margin-bottom:28px;">
      <h2 style="margin:0 0 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1e2d3d;">Projects</h2>
      <div style="width:40px;height:3px;background:#2ecc71;border-radius:2px;margin-bottom:14px;"></div>
      <div th:each="p : ${projects}" style="margin-bottom:14px;">
        <div style="font-size:13.5px;font-weight:700;color:#1e2d3d;" th:text="${p.name}"></div>
        <div th:if="${(p.techStack ?: p.technologies) != null and (p.techStack ?: p.technologies) != ''}" style="font-size:11.5px;color:#2ecc71;margin-top:2px;" th:text="${p.techStack} ?: ${p.technologies}"></div>
        <p th:if="${p.description != null and p.description != ''}" style="margin:5px 0 0;font-size:12px;color:#555;line-height:1.65;" th:text="${p.description}"></p>
      </div>
    </div>

    <div th:if="${certifications != null and !#lists.isEmpty(certifications)}">
      <h2 style="margin:0 0 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1e2d3d;">Certifications</h2>
      <div style="width:40px;height:3px;background:#2ecc71;border-radius:2px;margin-bottom:14px;"></div>
      <div th:each="c : ${certifications}" style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:#1e2d3d;" th:text="${c.name}"></div>
        <div style="font-size:11.5px;color:#888;" th:text="${c.issuer} + (${c.date ?: c.year} != null ? ' · ' + ${c.date ?: c.year} : '')"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
