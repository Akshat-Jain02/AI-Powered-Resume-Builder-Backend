<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Resume</title></head>
<body style="margin:0;padding:0;font-family:'Georgia',serif;background:#fff;color:#1a1a1a;">
<div style="width:800px;margin:0 auto;background:#fff;">

  <!-- MINIMAL HEADER -->
  <div style="padding:44px 52px 28px;border-bottom:3px solid #1a1a1a;">
    <h1 style="margin:0;font-size:36px;font-weight:400;letter-spacing:3px;text-transform:uppercase;" th:text="${fullName}">Your Name</h1>
    <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
      <span style="font-size:14px;font-style:italic;color:#555;" th:text="${targetJobTitle}"></span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:14px;font-size:11.5px;color:#444;font-family:'Helvetica Neue',Arial,sans-serif;">
      <span th:if="${email != ''}" th:text="${email}"></span>
      <span th:if="${phone != ''}" th:text="${phone}"></span>
      <span th:if="${address != ''}" th:text="${address}"></span>
      <span th:if="${linkedinUrl != ''}" th:text="${linkedinUrl}"></span>
      <span th:if="${githubUrl != ''}" th:text="${githubUrl}"></span>
    </div>
  </div>

  <div style="padding:32px 52px;">

    <div th:if="${summary != ''}" style="margin-bottom:30px;">
      <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 10px;font-family:'Helvetica Neue',Arial,sans-serif;">Summary</h2>
      <p style="margin:0;font-size:13.5px;line-height:1.85;color:#333;" th:text="${summary}"></p>
    </div>

    <div th:if="${experience != null and !#lists.isEmpty(experience)}" style="margin-bottom:30px;">
      <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 14px;font-family:'Helvetica Neue',Arial,sans-serif;border-bottom:1px solid #ccc;padding-bottom:6px;">Experience</h2>
      <div th:each="exp : ${experience}" style="margin-bottom:20px;display:flex;gap:20px;">
        <div style="width:130px;flex-shrink:0;font-size:11.5px;color:#666;font-family:'Helvetica Neue',Arial,sans-serif;">
          <div th:text="${exp.startDate}"></div>
          <div>—</div>
          <div th:text="${exp.current} ? 'Present' : (${exp.endDate} ?: '')"></div>
          <div th:if="${exp.location != null and exp.location != ''}" style="margin-top:4px;color:#888;" th:text="${exp.location}"></div>
        </div>
        <div style="flex:1;">
          <div style="font-size:14.5px;font-weight:700;" th:text="${exp.position} ?: ${exp.role} ?: ''"></div>
          <div style="font-size:13px;font-style:italic;color:#555;margin-top:1px;" th:text="${exp.company}"></div>
          <div th:if="${exp.description != null and exp.description != ''}" style="margin-top:8px;font-size:12.5px;line-height:1.75;color:#444;" th:text="${exp.description}"></div>
          <ul th:if="${exp.bullets != null and !#lists.isEmpty(exp.bullets)}" style="margin:8px 0 0;padding-left:18px;">
            <li th:each="b : ${exp.bullets}" style="font-size:12.5px;line-height:1.75;color:#444;margin-bottom:4px;" th:text="${b}"></li>
          </ul>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:40px;">
      <div style="flex:1;">
        <div th:if="${education != null and !#lists.isEmpty(education)}" style="margin-bottom:28px;">
          <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 14px;font-family:'Helvetica Neue',Arial,sans-serif;border-bottom:1px solid #ccc;padding-bottom:6px;">Education</h2>
          <div th:each="edu : ${education}" style="margin-bottom:14px;">
            <div style="font-size:13.5px;font-weight:700;" th:text="${edu.degree} + (${edu.field != null and edu.field != ''} ? ' in ' + ${edu.field} : '')"></div>
            <div style="font-size:12.5px;font-style:italic;color:#555;" th:text="${edu.institution}"></div>
            <div style="font-size:11.5px;color:#777;margin-top:2px;" th:text="${edu.startDate} + ' – ' + (${edu.endDate} ?: '')"></div>
          </div>
        </div>
        <div th:if="${certifications != null and !#lists.isEmpty(certifications)}">
          <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 12px;font-family:'Helvetica Neue',Arial,sans-serif;border-bottom:1px solid #ccc;padding-bottom:6px;">Certifications</h2>
          <div th:each="c : ${certifications}" style="margin-bottom:8px;">
            <div style="font-size:12.5px;font-weight:700;" th:text="${c.name}"></div>
            <div style="font-size:11.5px;font-style:italic;color:#666;" th:text="${c.issuer} + (${c.date ?: c.year} != null ? ', ' + ${c.date ?: c.year} : '')"></div>
          </div>
        </div>
      </div>
      <div style="flex:1;">
        <div th:if="${skills != null and !#lists.isEmpty(skills)}" style="margin-bottom:28px;">
          <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 14px;font-family:'Helvetica Neue',Arial,sans-serif;border-bottom:1px solid #ccc;padding-bottom:6px;">Skills</h2>
          <div style="font-size:13px;line-height:2;color:#333;" th:text="${#strings.listJoin(skills, ' · ')}"></div>
        </div>
        <div th:if="${projects != null and !#lists.isEmpty(projects)}">
          <h2 style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;margin:0 0 14px;font-family:'Helvetica Neue',Arial,sans-serif;border-bottom:1px solid #ccc;padding-bottom:6px;">Projects</h2>
          <div th:each="p : ${projects}" style="margin-bottom:12px;">
            <div style="font-size:13px;font-weight:700;" th:text="${p.name}"></div>
            <div th:if="${(p.techStack ?: p.technologies) != null and (p.techStack ?: p.technologies) != ''}" style="font-size:11.5px;font-style:italic;color:#555;" th:text="${p.techStack} ?: ${p.technologies}"></div>
            <div th:if="${p.description != null and p.description != ''}" style="font-size:12px;color:#555;margin-top:3px;" th:text="${p.description}"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
