<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Resume</title></head>
<body style="margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif;background:#fff;color:#222;">
<div style="width:800px;margin:0 auto;background:#fff;">

  <!-- HEADER with optional photo -->
  <div style="background:#1a3a5c;color:#fff;padding:40px 48px;display:flex;align-items:center;gap:32px;">
    <div th:if="${photoBase64 != null and photoBase64 != ''}" style="flex-shrink:0;">
      <img th:src="'data:image/jpeg;base64,' + ${photoBase64}" style="width:112px;height:112px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,0.4);"/>
    </div>
    <div style="flex:1;">
      <h1 style="margin:0;font-size:32px;font-weight:700;letter-spacing:0.5px;" th:text="${fullName}">Your Name</h1>
      <p style="margin:6px 0 16px;font-size:15px;color:#7fb3d3;font-weight:500;" th:text="${targetJobTitle}">Professional Title</p>
      <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:#b8d4ea;">
        <span th:if="${email != ''}" th:text="${email}"></span>
        <span th:if="${phone != ''}" th:text="${phone}"></span>
        <span th:if="${address != ''}" th:text="${address}"></span>
        <span th:if="${linkedinUrl != ''}" th:text="${linkedinUrl}"></span>
        <span th:if="${githubUrl != ''}" th:text="${githubUrl}"></span>
      </div>
    </div>
  </div>

  <div style="display:flex;">
    <!-- LEFT MAIN -->
    <div style="flex:2;padding:32px 36px;">

      <div th:if="${summary != ''}" style="margin-bottom:28px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:12px;">Professional Summary</div>
        <p style="margin:0;font-size:13px;line-height:1.8;color:#444;" th:text="${summary}"></p>
      </div>

      <div th:if="${experience != null and !#lists.isEmpty(experience)}" style="margin-bottom:28px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:14px;">Work Experience</div>
        <div th:each="exp : ${experience}" style="margin-bottom:18px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:14px;font-weight:700;color:#111;" th:text="${exp.position} ?: ${exp.role} ?: ''"></div>
              <div style="font-size:12.5px;color:#1a3a5c;font-weight:600;margin-top:1px;" th:text="${exp.company}"></div>
            </div>
            <div style="font-size:11px;color:#888;white-space:nowrap;margin-left:12px;text-align:right;">
              <div th:text="${exp.startDate} + ' – ' + (${exp.current} ? 'Present' : (${exp.endDate} ?: ''))"></div>
              <div th:if="${exp.location != null and exp.location != ''}" th:text="${exp.location}" style="margin-top:2px;"></div>
            </div>
          </div>
          <div th:if="${exp.description != null and exp.description != ''}" style="margin-top:7px;font-size:12.5px;line-height:1.7;color:#444;" th:text="${exp.description}"></div>
          <ul th:if="${exp.bullets != null and !#lists.isEmpty(exp.bullets)}" style="margin:7px 0 0;padding-left:18px;">
            <li th:each="b : ${exp.bullets}" style="font-size:12.5px;line-height:1.7;color:#444;margin-bottom:3px;" th:text="${b}"></li>
          </ul>
        </div>
      </div>

      <div th:if="${projects != null and !#lists.isEmpty(projects)}" style="margin-bottom:28px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:14px;">Projects</div>
        <div th:each="p : ${projects}" style="margin-bottom:14px;">
          <div style="display:flex;align-items:baseline;gap:8px;">
            <strong style="font-size:13px;color:#111;" th:text="${p.name}"></strong>
            <span th:if="${(p.techStack ?: p.technologies) != null and (p.techStack ?: p.technologies) != ''}" style="font-size:11px;color:#1a3a5c;background:#e8f0f8;padding:2px 8px;border-radius:3px;" th:text="${p.techStack} ?: ${p.technologies}"></span>
          </div>
          <p th:if="${p.description != null and p.description != ''}" style="margin:5px 0 0;font-size:12px;line-height:1.65;color:#555;" th:text="${p.description}"></p>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div style="flex:1;padding:32px 24px;background:#f0f4f9;">

      <div th:if="${skills != null and !#lists.isEmpty(skills)}" style="margin-bottom:24px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:12px;">Skills</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          <span th:each="s : ${skills}" style="background:#1a3a5c;color:#fff;padding:4px 10px;border-radius:4px;font-size:11.5px;" th:text="${s}"></span>
        </div>
      </div>

      <div th:if="${education != null and !#lists.isEmpty(education)}" style="margin-bottom:24px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:12px;">Education</div>
        <div th:each="edu : ${education}" style="margin-bottom:14px;">
          <div style="font-size:13px;font-weight:700;color:#111;" th:text="${edu.degree}"></div>
          <div th:if="${edu.field != null and edu.field != ''}" style="font-size:12px;color:#444;" th:text="${edu.field}"></div>
          <div style="font-size:12px;color:#1a3a5c;font-weight:600;margin-top:2px;" th:text="${edu.institution}"></div>
          <div style="font-size:11px;color:#888;margin-top:2px;" th:text="${edu.startDate} + ' – ' + (${edu.endDate} ?: '')"></div>
          <div th:if="${edu.grade != null and edu.grade != ''}" style="font-size:11px;color:#555;margin-top:2px;" th:text="'GPA/Grade: ' + ${edu.grade}"></div>
        </div>
      </div>

      <div th:if="${certifications != null and !#lists.isEmpty(certifications)}" style="margin-bottom:24px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:12px;">Certifications</div>
        <div th:each="c : ${certifications}" style="margin-bottom:10px;">
          <div style="font-size:12.5px;font-weight:700;color:#111;" th:text="${c.name}"></div>
          <div style="font-size:11.5px;color:#555;" th:text="${c.issuer} + (${c.date ?: c.year} != null ? ' · ' + ${c.date ?: c.year} : '')"></div>
        </div>
      </div>

      <div th:if="${resumeLanguages != null and !#lists.isEmpty(resumeLanguages)}">
        <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:5px;margin-bottom:12px;">Languages</div>
        <div th:each="l : ${resumeLanguages}" style="font-size:12.5px;color:#333;margin-bottom:5px;" th:text="'• ' + ${l}"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
