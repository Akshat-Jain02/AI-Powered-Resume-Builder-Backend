<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Resume</title></head>
<body style="margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif;background:#fff;color:#1a1a1a;">
<div style="width:800px;margin:0 auto;background:#fff;">

  <!-- ATS-CLEAN HEADER -->
  <div style="padding:40px 48px 28px;">
    <h1 style="margin:0;font-size:28px;font-weight:700;color:#0d1117;" th:text="${fullName}">Your Name</h1>
    <p style="margin:4px 0 14px;font-size:14px;color:#0070f3;font-weight:600;" th:text="${targetJobTitle}">Professional Title</p>
    <div style="font-size:12px;color:#555;display:flex;flex-wrap:wrap;gap:16px;border-top:2px solid #0070f3;padding-top:12px;">
      <span th:if="${email != ''}" th:text="${email}"></span>
      <span th:if="${phone != ''}" th:text="${phone}"></span>
      <span th:if="${address != ''}" th:text="${address}"></span>
      <span th:if="${linkedinUrl != ''}" th:text="${linkedinUrl}"></span>
      <span th:if="${githubUrl != ''}" th:text="${githubUrl}"></span>
    </div>
  </div>

  <div style="padding:0 48px 40px;">

    <div th:if="${summary != ''}" style="margin-bottom:26px;">
      <div style="background:#f0f7ff;border-left:4px solid #0070f3;padding:14px 18px;border-radius:0 6px 6px 0;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:6px;">Summary</div>
        <p style="margin:0;font-size:13px;line-height:1.8;color:#333;" th:text="${summary}"></p>
      </div>
    </div>

    <div th:if="${skills != null and !#lists.isEmpty(skills)}" style="margin-bottom:26px;">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:10px;">Core Skills</div>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;">
        <span th:each="s : ${skills}" style="background:#fff;border:1px solid #0070f3;color:#0070f3;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500;" th:text="${s}"></span>
      </div>
    </div>

    <div th:if="${experience != null and !#lists.isEmpty(experience)}" style="margin-bottom:26px;">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:14px;">Professional Experience</div>
      <div th:each="exp : ${experience}" style="margin-bottom:20px;padding:16px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div style="font-size:14.5px;font-weight:700;color:#0d1117;" th:text="${exp.position} ?: ${exp.role} ?: ''"></div>
            <div style="font-size:13px;color:#0070f3;font-weight:600;margin-top:2px;" th:text="${exp.company} + (${exp.location != null and exp.location != ''} ? ' · ' + ${exp.location} : '')"></div>
          </div>
          <span style="font-size:11px;color:#718096;white-space:nowrap;" th:text="${exp.startDate} + ' – ' + (${exp.current} ? 'Present' : (${exp.endDate} ?: ''))"></span>
        </div>
        <div th:if="${exp.description != null and exp.description != ''}" style="margin-top:8px;font-size:12.5px;line-height:1.75;color:#444;" th:text="${exp.description}"></div>
        <ul th:if="${exp.bullets != null and !#lists.isEmpty(exp.bullets)}" style="margin:8px 0 0;padding-left:18px;">
          <li th:each="b : ${exp.bullets}" style="font-size:12.5px;line-height:1.75;color:#444;margin-bottom:4px;" th:text="${b}"></li>
        </ul>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px;">
      <div>
        <div th:if="${education != null and !#lists.isEmpty(education)}" style="margin-bottom:22px;">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:12px;">Education</div>
          <div th:each="edu : ${education}" style="margin-bottom:12px;padding:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;">
            <div style="font-size:13px;font-weight:700;" th:text="${edu.degree} + (${edu.field != null and edu.field != ''} ? ' in ' + ${edu.field} : '')"></div>
            <div style="font-size:12.5px;color:#0070f3;font-weight:600;" th:text="${edu.institution}"></div>
            <div style="font-size:11px;color:#888;" th:text="${edu.startDate} + ' – ' + (${edu.endDate} ?: '')"></div>
          </div>
        </div>
      </div>
      <div>
        <div th:if="${projects != null and !#lists.isEmpty(projects)}" style="margin-bottom:22px;">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:12px;">Projects</div>
          <div th:each="p : ${projects}" style="margin-bottom:10px;padding:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;">
            <div style="font-size:13px;font-weight:700;" th:text="${p.name}"></div>
            <div th:if="${(p.techStack ?: p.technologies) != null and (p.techStack ?: p.technologies) != ''}" style="font-size:11.5px;color:#0070f3;" th:text="${p.techStack} ?: ${p.technologies}"></div>
            <div th:if="${p.description != null and p.description != ''}" style="font-size:12px;color:#555;margin-top:3px;" th:text="${p.description}"></div>
          </div>
        </div>
        <div th:if="${certifications != null and !#lists.isEmpty(certifications)}">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0070f3;margin-bottom:12px;">Certifications</div>
          <div th:each="c : ${certifications}" style="margin-bottom:8px;padding:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;">
            <div style="font-size:12.5px;font-weight:700;" th:text="${c.name}"></div>
            <div style="font-size:11.5px;color:#777;" th:text="${c.issuer} + (${c.date ?: c.year} != null ? ' · ' + ${c.date ?: c.year} : '')"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
