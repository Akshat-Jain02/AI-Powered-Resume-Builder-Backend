spring.application.name=section-service
server.port = 8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
# ── Logging ──────────────────────────────────────────────────────────────────
# logback-spring.xml handles appenders, rolling, patterns, and per-package levels.
# Only override log directory and active profile here.
logging.file.path=../logs/section-service
# Default active profile (override with -Dspring.profiles.active=prod in production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
