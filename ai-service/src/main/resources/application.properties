spring.application.name=ai-service
server.port=8084


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}


spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false


#  Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
management.endpoints.web.exposure.include=health,info


# logback-spring.xml handles appenders, rolling, patterns, and per-package levels.
# Only override log directory and active profile here.
logging.file.path=../logs/ai-service

