# Test configuration
spring.application.name=ai-service

# Disable Eureka for tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Dummy Gemini API key
gemini.api.key=dummy-key

# Disable Kafka auto-config for tests
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Disable actuator
management.endpoints.web.exposure.include=health

