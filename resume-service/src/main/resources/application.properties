spring.application.name=resume-service


spring.datasource.url=jdbc:mysql://localhost:3306/resume_service
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  Server
server.port=8088

#  File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#  Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
#  Feign logging

#  Logging
# logback-spring.xml handles appenders, rolling, patterns, and per-package levels.
logging.file.path=../logs/resume-service

